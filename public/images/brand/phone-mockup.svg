  <text x="56" y="296" font-family="system-ui, sans-serif" font-size="9" fill="#71717A">Accra • 2x3m • GH₵50/day</text>

  <!-- Space card 2 -->
  <rect x="44" y="320" width="192" height="120" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
