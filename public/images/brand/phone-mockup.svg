<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 560" fill="none">
  <!-- Phone body -->
  <rect x="20" y="20" width="240" height="520" rx="36" fill="#18181B" stroke="#3F3F46" stroke-width="2"/>
